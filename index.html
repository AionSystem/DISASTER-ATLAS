
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disaster Atlas – Real‑Time Risk Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#08090b; --surface:#0e1117; --panel:#141920; --border:#1e2730;
      --amber:#f0a500; --amber-d:#b07800; --amber-l:#ffc947; --gold:#D4AF37;
      --text:#c4d4de; --muted:#4e5f6a; --dim:#2a3540; --red:#ff4d4d;
      --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
      --serif:'Crimson Pro',Georgia,serif; --jmono:'JetBrains Mono',monospace;
      --ease:cubic-bezier(0.16,1,0.3,1);
    }
    body { margin:0; overflow:hidden; font-family:var(--sans); background:var(--bg); color:var(--text); cursor:none; }
    .custom-cursor{
      width:20px;height:20px;border:2px solid var(--amber);border-radius:50%;
      position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:difference;
      transition:transform 0.1s ease,background 0.2s ease;
      transform:translate(-50%,-50%);
    }
    .custom-cursor.hover{transform:translate(-50%,-50%) scale(1.5);background:rgba(240,165,0,0.1);border-color:var(--gold);}
    #controls-panel {
      position:absolute; top:20px; right:20px; z-index:150;
      background:rgba(14,17,23,0.85); backdrop-filter:blur(12px);
      border:1px solid var(--border); border-radius:8px; padding:12px;
      font-family:var(--mono); font-size:11px; width:280px;
      pointer-events:auto;
    }
    #controls-panel h3 { margin:0 0 8px; font-size:12px; color:var(--amber); letter-spacing:1px; }
    .toggle-group { display:flex; gap:12px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
    .toggle-group label { display:flex; align-items:center; gap:6px; cursor:pointer; }
    .toggle-group input { accent-color:var(--amber); }
    .filter-group { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .filter-group select, .filter-group input {
      flex:1; background:var(--bg); border:1px solid var(--border);
      color:var(--text); font-family:var(--mono); font-size:10px;
      padding:4px 6px; border-radius:4px;
    }
    .filter-group button { background:rgba(0,0,0,0.6); border:1px solid var(--amber); color:var(--amber); cursor:pointer; padding:4px 8px; border-radius:4px; font-family:var(--mono); font-size:10px; }
    .filter-group button:hover { background:var(--amber); color:#000; }
    .search-group { margin-bottom:12px; }
    .search-group input { width:100%; }
    .disclaimer {
      font-size:9px; color:var(--muted); margin-top:12px; padding-top:8px;
      border-top:1px solid var(--border); text-align:center;
    }
    .disclaimer a { color:var(--amber); text-decoration:none; }
    .connection-panel {
      position:absolute; bottom:80px; right:20px; width:300px;
      background:rgba(14,17,23,0.9); backdrop-filter:blur(12px);
      border:1px solid var(--border); border-radius:8px;
      font-family:var(--mono); font-size:11px; pointer-events:auto; z-index:200;
      transition:all 0.2s;
    }
    .panel-header {
      background:var(--surface); padding:10px 12px; border-bottom:1px solid var(--border);
      font-weight:bold; color:var(--amber); display:flex; justify-content:space-between;
      align-items:center;
    }
    .panel-header button { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:14px; margin-left:8px; }
    .panel-header button:hover { color:var(--amber); }
    .selected-company { padding:10px 12px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.3); }
    .selected-company .ticker { font-size:13px; font-weight:bold; color:var(--amber); }
    .connections-list { max-height:250px; overflow-y:auto; padding:4px 0; }
    .conn-item { padding:6px 12px; border-bottom:1px solid rgba(30,39,48,0.6); display:flex; justify-content:space-between; }
    .conn-ticker { font-weight:bold; color:var(--amber-l); }
    .conn-risk.neg { color:var(--red); }
    .conn-risk.pos { color:#66cc66; }
    .no-connections { padding:12px; text-align:center; color:var(--muted); }
    .legend {
      position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.6);
      padding:6px 10px; border-radius:4px; font-size:9px; font-family:var(--mono);
      pointer-events:none; z-index:100;
    }
    .legend div { display:flex; align-items:center; gap:6px; margin:2px 0; }
    .color-box { width:12px; height:12px; border-radius:2px; }
    button, .action-btn { background:rgba(0,0,0,0.6); border:1px solid var(--amber); color:var(--amber); cursor:pointer; font-family:var(--mono); font-size:10px; padding:4px 8px; border-radius:4px; transition:all 0.2s; }
    button:hover, .action-btn:hover { background:var(--amber); color:#000; }
    .status { position:absolute; bottom:20px; right:20px; font-size:10px; color:#aaa; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; pointer-events:none; z-index:100; }
    @media (max-width:700px) { #controls-panel { width:240px; font-size:10px; } .connection-panel { width:260px; bottom:70px; right:10px; } .legend { bottom:10px; left:10px; } .status { bottom:10px; right:10px; } }
  </style>
</head>
<body>
<div class="custom-cursor" id="custom-cursor"></div>

<!-- Control Panel -->
<div id="controls-panel">
  <h3>🌍 Disaster Atlas</h3>
  <div class="toggle-group">
    <label><input type="radio" name="dataMode" value="real" checked> Real (USGS/NOAA)</label>
    <label><input type="radio" name="dataMode" value="demo"> Synthetic Demo</label>
  </div>
  <div class="filter-group">
    <select id="typeFilter">
      <option value="all">All infrastructure</option>
      <option value="city">Cities</option>
      <option value="port">Ports</option>
      <option value="plant">Power plants</option>
    </select>
    <button id="resetFilterBtn">Reset</button>
  </div>
  <div class="search-group">
    <input type="text" id="searchInput" placeholder="Search by name (e.g., New York)">
  </div>
  <div style="display:flex; gap:8px; margin-top:8px;">
    <button id="resetViewBtn">Reset View</button>
    <button id="clearConnectionsBtn">Clear Lines</button>
  </div>
  <div class="disclaimer">
    ⚡ Real data: earthquakes (USGS), hurricanes (NOAA).<br>
    <a href="#" id="learnMore">How to get your own API keys →</a>
  </div>
</div>

<div class="legend">
  <div><div class="color-box" style="background:#ff4d4d;"></div> High risk (disaster active)</div>
  <div><div class="color-box" style="background:#ffaa33;"></div> Moderate risk</div>
  <div><div class="color-box" style="background:#66cc66;"></div> Low risk</div>
  <div><div class="color-box" style="background:#33aaff;"></div> No risk</div>
  <div><div class="color-box" style="background:#aaa;"></div> Size = importance</div>
</div>

<div class="status" id="status">loading infrastructure...</div>

<!-- Connection panel -->
<div id="connectionPanel" class="connection-panel" style="display:none;">
  <div class="panel-header">
    <span>🔗 RISK CONNECTIONS</span>
    <button id="closePanelBtn">✕</button>
  </div>
  <div id="panelContent"></div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // ---------- Configuration ----------
  const INNER_RADIUS = 2.2;
  const OUTER_RADIUS = 5.8;
  const CONNECTIONS_PER_NODE = 6;
  const RED_THRESHOLD = 70;   // risk % to be considered "red"
  
  // ---------- Data structures ----------
  let positions = [];          // THREE.Vector3 array
  let nodeNames = [];
  let nodeTypes = [];          // 'city', 'port', 'plant'
  let nodeImportance = [];     // for size (population, capacity)
  let riskLevel = [];          // 0..100 synthetic or computed
  let adjacency = [];
  let pointsGeometry = null;
  let pointsMesh = null;
  let currentLines = null;
  let currentSelectedIdx = -1;
  let typeFilter = 'all';
  let dataMode = 'real';       // 'real' or 'demo'
  
  // Tooltip timer
  let tooltipTimer = null;
  
  // ---------- Helper functions ----------
  function getColorFromRisk(risk) {
    if (risk > 70) return [1.0, 0.2, 0.2];
    if (risk > 40) return [1.0, 0.65, 0.2];
    if (risk > 10) return [0.4, 0.8, 0.4];
    return [0.3, 0.6, 1.0];
  }
  
  function latLonToVector(lat, lon, radius) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = lon * Math.PI / 180;
    const x = radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
  }
  
  // ---------- Build static infrastructure dataset (cities, ports, plants) ----------
  function buildInfrastructureDataset() {
    // US cities with lat/lon, population (millions)
    const cities = [
      { lat: 40.7128, lon: -74.0060, name: "New York", pop: 8.4, type: "city" },
      { lat: 34.0522, lon: -118.2437, name: "Los Angeles", pop: 3.9, type: "city" },
      { lat: 41.8781, lon: -87.6298, name: "Chicago", pop: 2.7, type: "city" },
      { lat: 29.7604, lon: -95.3698, name: "Houston", pop: 2.3, type: "city" },
      { lat: 39.9526, lon: -75.1652, name: "Philadelphia", pop: 1.6, type: "city" },
      { lat: 32.7157, lon: -117.1611, name: "San Diego", pop: 1.4, type: "city" },
      { lat: 33.7490, lon: -84.3880, name: "Atlanta", pop: 0.5, type: "city" },
      { lat: 42.3601, lon: -71.0589, name: "Boston", pop: 0.7, type: "city" },
      { lat: 33.4484, lon: -112.0740, name: "Phoenix", pop: 1.7, type: "city" },
      { lat: 47.6062, lon: -122.3321, name: "Seattle", pop: 0.7, type: "city" },
      { lat: 25.7617, lon: -80.1918, name: "Miami", pop: 0.5, type: "city" },
      { lat: 38.9072, lon: -77.0369, name: "Washington DC", pop: 0.7, type: "city" },
      { lat: 39.7392, lon: -104.9903, name: "Denver", pop: 0.7, type: "city" },
      { lat: 38.6270, lon: -90.1994, name: "St. Louis", pop: 0.3, type: "city" },
      { lat: 45.5152, lon: -122.6784, name: "Portland", pop: 0.6, type: "city" }
    ];
    // Ports
    const ports = [
      { lat: 40.7, lon: -74.0, name: "Port of NY/NJ", capacity: 80, type: "port" },
      { lat: 33.7, lon: -118.2, name: "Port of LA/Long Beach", capacity: 90, type: "port" },
      { lat: 29.7, lon: -95.0, name: "Port of Houston", capacity: 70, type: "port" },
      { lat: 32.7, lon: -117.2, name: "Port of San Diego", capacity: 40, type: "port" },
      { lat: 42.3, lon: -71.0, name: "Port of Boston", capacity: 30, type: "port" },
      { lat: 47.6, lon: -122.3, name: "Port of Seattle", capacity: 50, type: "port" },
      { lat: 25.8, lon: -80.1, name: "PortMiami", capacity: 45, type: "port" }
    ];
    // Power plants (US examples)
    const plants = [
      { lat: 34.0, lon: -118.0, name: "Diablo Canyon", capacity: 2.2, type: "plant" },
      { lat: 41.0, lon: -73.0, name: "Millstone", capacity: 2.0, type: "plant" },
      { lat: 39.0, lon: -89.0, name: "Clinton", capacity: 1.0, type: "plant" },
      { lat: 32.0, lon: -81.0, name: "Vogtle", capacity: 2.4, type: "plant" },
      { lat: 38.0, lon: -121.0, name: "Rancho Seco", capacity: 0.9, type: "plant" },
      { lat: 40.0, lon: -74.0, name: "Hope Creek", capacity: 1.2, type: "plant" }
    ];
    const nodes = [...cities, ...ports, ...plants];
    // Add random extra points to reach a reasonable number (~200)
    const extraNeeded = 200 - nodes.length;
    for (let i = 0; i < extraNeeded; i++) {
      const lat = (Math.random() - 0.5) * 170;
      const lon = Math.random() * 360 - 180;
      const type = Math.random() < 0.6 ? "city" : (Math.random() < 0.5 ? "port" : "plant");
      const name = `${type.charAt(0).toUpperCase() + type.slice(1)}-${i+1}`;
      const importance = type === "city" ? Math.random() * 5 : (type === "port" ? Math.random() * 100 : Math.random() * 3);
      nodes.push({ lat, lon, name, importance, type });
    }
    return nodes;
  }
  
  // ---------- Fetch real‑time earthquakes from USGS (no key) ----------
  async function fetchEarthquakes() {
    const url = "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&minmagnitude=4.0&limit=50";
    try {
      const response = await fetch(url);
      const data = await response.json();
      return data.features.map(f => ({
        lat: f.geometry.coordinates[1],
        lon: f.geometry.coordinates[0],
        magnitude: f.properties.mag,
        name: `M${f.properties.mag.toFixed(1)} quake`
      }));
    } catch (err) {
      console.warn("Earthquake fetch failed:", err);
      return [];
    }
  }
  
  // ---------- Fetch active hurricanes from NOAA (public GeoJSON) ----------
  // NOAA provides current storm data at: https://www.nhc.noaa.gov/gis/ – we'll use a static sample for demo
  // Real endpoint would be dynamic, but we'll simulate with a placeholder.
  async function fetchHurricanes() {
    // NOAA public GeoJSON for active storms (this URL may change; we use a static sample for reliability)
    const url = "https://www.nhc.noaa.gov/gis/forecast/geojson/";
    // For demo purposes, return a sample if fetch fails
    try {
      const response = await fetch(url + "latest.json");
      const data = await response.json();
      // parse features (simplified)
      return data.features.map(f => ({
        lat: f.geometry.coordinates[1],
        lon: f.geometry.coordinates[0],
        name: f.properties.name || "Hurricane",
        magnitude: f.properties.wind_speed ? f.properties.wind_speed / 100 : 1
      }));
    } catch (err) {
      console.warn("Hurricane fetch failed, using sample data.");
      // Return sample hurricane off Florida
      return [{
        lat: 28.0, lon: -80.0, name: "Sample Hurricane", magnitude: 2.0
      }];
    }
  }
  
  // ---------- Update risk levels based on real events ----------
  async function updateRealRisks() {
    const quakes = await fetchEarthquakes();
    const hurricanes = await fetchHurricanes();
    // Reset risk for all nodes (base risk 10)
    riskLevel.fill(10);
    // Apply earthquake risk: distance‑based
    quakes.forEach(eq => {
      const eqVec = latLonToVector(eq.lat, eq.lon, 1.2);
      for (let i = 0; i < positions.length; i++) {
        const nodeVec = positions[i];
        const dist = nodeVec.distanceTo(eqVec);
        if (dist < 1.0) riskLevel[i] = Math.min(100, riskLevel[i] + 50 * (1 - dist));
        else if (dist < 2.0) riskLevel[i] = Math.min(100, riskLevel[i] + 20 * (1 - (dist-1)));
      }
    });
    // Apply hurricane risk (simple radius)
    hurricanes.forEach(hur => {
      const hurVec = latLonToVector(hur.lat, hur.lon, 1.2);
      for (let i = 0; i < positions.length; i++) {
        const dist = positions[i].distanceTo(hurVec);
        if (dist < 1.5) riskLevel[i] = Math.min(100, riskLevel[i] + 40 * (1 - dist/1.5));
      }
    });
    // Update visuals
    updatePointsVisuals();
    document.getElementById('status').innerHTML = `Real data: ${quakes.length} quakes, ${hurricanes.length} storms — risk updated.`;
  }
  
  // ---------- Synthetic data (demo) ----------
  function generateSyntheticData() {
    const nodes = buildInfrastructureDataset();
    const newPositions = [];
    const newNames = [];
    const newTypes = [];
    const newImportance = [];
    const newRisk = [];
    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const r = INNER_RADIUS + (Math.random() * (OUTER_RADIUS - INNER_RADIUS));
      const pos = latLonToVector(node.lat, node.lon, r);
      newPositions.push(pos);
      newNames.push(node.name);
      newTypes.push(node.type);
      newImportance.push(node.importance || (node.pop || node.capacity || 1));
      // synthetic risk: coastal areas higher
      const coastal = Math.abs(node.lat) < 60 && Math.abs(node.lon) > 30;
      const baseRisk = coastal ? 60 : 30;
      newRisk.push(Math.min(100, Math.max(0, baseRisk + (Math.random() - 0.5) * 40)));
    }
    positions = newPositions;
    nodeNames = newNames;
    nodeTypes = newTypes;
    nodeImportance = newImportance;
    riskLevel = newRisk;
    // Build graph: connect nodes within 20° angular distance, with same‑type bias
    adjacency = Array(positions.length).fill().map(() => []);
    for (let i = 0; i < positions.length; i++) {
      const targetDeg = Math.floor(CONNECTIONS_PER_NODE + (Math.random() - 0.5) * 2);
      let added = 0;
      while (added < targetDeg && adjacency[i].length < targetDeg + 2) {
        let j = Math.floor(Math.random() * positions.length);
        if (j === i || adjacency[i].includes(j)) continue;
        const p1 = positions[i];
        const p2 = positions[j];
        const dot = p1.x*p2.x + p1.y*p2.y + p1.z*p2.z;
        const angle = Math.acos(Math.min(1, Math.max(-1, dot / (INNER_RADIUS*OUTER_RADIUS))));
        const distDeg = angle * 180 / Math.PI;
        const sameType = (nodeTypes[i] === nodeTypes[j]);
        const prob = sameType ? 0.8 : 0.3;
        if (distDeg < 30 && Math.random() < prob) {
          adjacency[i].push(j);
          adjacency[j].push(i);
          added++;
        }
      }
    }
  }
  
  // ---------- Update points geometry colors from riskLevel ----------
  function updatePointsVisuals() {
    if (!pointsGeometry) return;
    const colorAttr = pointsGeometry.attributes.color;
    const array = colorAttr.array;
    for (let i = 0; i < positions.length; i++) {
      const col = getColorFromRisk(riskLevel[i]);
      array[i*3] = col[0];
      array[i*3+1] = col[1];
      array[i*3+2] = col[2];
    }
    colorAttr.needsUpdate = true;
  }
  
  // ---------- Apply type filter ----------
  function applyTypeFilter() {
    if (!pointsGeometry) return;
    const colorAttr = pointsGeometry.attributes.color;
    const array = colorAttr.array;
    for (let i = 0; i < positions.length; i++) {
      if (typeFilter !== 'all' && nodeTypes[i] !== typeFilter) {
        array[i*3] = 0.3;
        array[i*3+1] = 0.3;
        array[i*3+2] = 0.3;
      } else {
        const col = getColorFromRisk(riskLevel[i]);
        array[i*3] = col[0];
        array[i*3+1] = col[1];
        array[i*3+2] = col[2];
      }
    }
    colorAttr.needsUpdate = true;
  }
  
  function resetFilter() {
    typeFilter = 'all';
    document.getElementById('typeFilter').value = 'all';
    applyTypeFilter();
  }
  
  // ---------- Lines & panel ----------
  function drawLinesForNode(idx) {
    if (currentLines) scene.remove(currentLines);
    const connections = adjacency[idx];
    if (!connections.length) return;
    const limited = connections.slice(0, 10);
    const vertices = [];
    const p1 = positions[idx];
    limited.forEach(nei => {
      const p2 = positions[nei];
      vertices.push(p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
    });
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffaa33 });
    const lines = new THREE.LineSegments(lineGeo, lineMat);
    scene.add(lines);
    currentLines = lines;
  }
  
  function clearLines() {
    if (currentLines) { scene.remove(currentLines); currentLines = null; }
  }
  
  function showConnectionPanel(idx) {
    const panel = document.getElementById('connectionPanel');
    const panelContent = document.getElementById('panelContent');
    const risk = riskLevel[idx];
    const type = nodeTypes[idx];
    const importance = nodeImportance[idx];
    const connections = adjacency[idx];
    const limited = connections.slice(0, 10);
    const connHTML = limited.map(connIdx => {
      const connRisk = riskLevel[connIdx];
      const riskClass = connRisk > 70 ? 'neg' : (connRisk > 40 ? '' : 'pos');
      const riskText = `${connRisk.toFixed(0)}%`;
      return `
        <div class="conn-item">
          <span class="conn-ticker">${nodeNames[connIdx]}</span>
          <span class="conn-risk ${riskClass}">${riskText}</span>
          <span style="color:var(--muted);">${nodeTypes[connIdx]}</span>
        </div>
      `;
    }).join('');
    panelContent.innerHTML = `
      <div class="selected-company">
        <div class="ticker">${nodeNames[idx]}</div>
        <div>Type: ${type.charAt(0).toUpperCase() + type.slice(1)}</div>
        <div>Risk: ${risk.toFixed(0)}%</div>
        <div>Importance: ${importance.toFixed(1)}</div>
      </div>
      <div style="padding:6px 12px; font-size:10px; color:var(--muted);">Connections (up to 10):</div>
      <div class="connections-list">${connHTML || '<div class="no-connections">No direct connections</div>'}</div>
    `;
    panel.style.display = 'block';
  }
  
  function hideConnectionPanel() {
    const panel = document.getElementById('connectionPanel');
    panel.style.display = 'none';
    clearLines();
    currentSelectedIdx = -1;
  }
  
  // ---------- Data mode switch ----------
  async function switchDataMode(mode) {
    dataMode = mode;
    if (mode === 'real') {
      // Generate base infrastructure first (if not already)
      if (positions.length === 0) generateSyntheticData();
      await updateRealRisks();
      document.getElementById('status').innerHTML = `Real mode: fetching live data...`;
    } else {
      generateSyntheticData();
      updatePointsVisuals();
      document.getElementById('status').innerHTML = `Demo mode: ${positions.length} synthetic nodes.`;
    }
    // Rebuild geometry
    rebuildPointsGeometry();
    resetFilter();
    hideConnectionPanel();
  }
  
  function rebuildPointsGeometry() {
    const posArray = new Float32Array(positions.length * 3);
    positions.forEach((p, i) => {
      posArray[i*3] = p.x;
      posArray[i*3+1] = p.y;
      posArray[i*3+2] = p.z;
    });
    pointsGeometry.dispose();
    pointsGeometry = new THREE.BufferGeometry();
    pointsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const colorArray = new Float32Array(positions.length * 3);
    for (let i = 0; i < positions.length; i++) {
      const col = getColorFromRisk(riskLevel[i]);
      colorArray[i*3] = col[0];
      colorArray[i*3+1] = col[1];
      colorArray[i*3+2] = col[2];
    }
    pointsGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
    pointsMesh.geometry.dispose();
    pointsMesh.geometry = pointsGeometry;
  }
  
  // ---------- Three.js scene setup ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x030405);
  scene.fog = new THREE.FogExp2(0x030405, 0.00004);
  
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 12);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);
  
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = false;
  controls.enableZoom = true;
  controls.zoomSpeed = 0.8;
  controls.rotateSpeed = 0.8;
  controls.minDistance = 3;
  controls.maxDistance = 22;
  controls.target.set(0,0,0);
  
  // Bloom
  const renderScenePass = new RenderPass(scene, camera);
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
  bloomPass.threshold = 0.1; bloomPass.strength = 1.0; bloomPass.radius = 0.5;
  const effectComposer = new EffectComposer(renderer);
  effectComposer.addPass(renderScenePass);
  effectComposer.addPass(bloomPass);
  
  // Lights
  const ambientLight = new THREE.AmbientLight(0x222222);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0xffaa33, 0.8);
  pointLight.position.set(2, 5, 3);
  scene.add(pointLight);
  const backLight = new THREE.PointLight(0x2266ff, 0.5);
  backLight.position.set(-2, -1, -4);
  scene.add(backLight);
  
  // Earth with textures
  const textureLoader = new THREE.TextureLoader();
  const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
  const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
  const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
  const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
  const earthMat = new THREE.MeshPhongMaterial({ map: earthMap, specularMap: earthSpecularMap, specular: new THREE.Color('grey'), shininess: 5, normalMap: earthNormalMap });
  const earth = new THREE.Mesh(new THREE.SphereGeometry(1.2, 128, 128), earthMat);
  scene.add(earth);
  const cloudMat = new THREE.MeshPhongMaterial({ map: cloudMap, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending });
  const clouds = new THREE.Mesh(new THREE.SphereGeometry(1.21, 128, 128), cloudMat);
  scene.add(clouds);
  function animateClouds() { clouds.rotation.y += 0.0005; requestAnimationFrame(animateClouds); }
  animateClouds();
  
  // Starfield
  const starCount = 6000;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 45 + Math.random() * 25, theta = Math.random() * Math.PI * 2, phi = Math.acos(2 * Math.random() - 1);
    starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i*3+2] = r * Math.cos(phi);
  }
  const starGeometry = new THREE.BufferGeometry();
  starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6 });
  const stars = new THREE.Points(starGeometry, starMaterial);
  scene.add(stars);
  
  // Initialize points mesh
  generateSyntheticData();   // initial dataset
  const posArray = new Float32Array(positions.length * 3);
  positions.forEach((p, i) => {
    posArray[i*3] = p.x;
    posArray[i*3+1] = p.y;
    posArray[i*3+2] = p.z;
  });
  pointsGeometry = new THREE.BufferGeometry();
  pointsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  const colorArray = new Float32Array(positions.length * 3);
  for (let i = 0; i < positions.length; i++) {
    const col = getColorFromRisk(riskLevel[i]);
    colorArray[i*3] = col[0];
    colorArray[i*3+1] = col[1];
    colorArray[i*3+2] = col[2];
  }
  pointsGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
  const pointMaterial = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
  pointsMesh = new THREE.Points(pointsGeometry, pointMaterial);
  scene.add(pointsMesh);
  
  // ---------- UI event handlers ----------
  document.getElementById('typeFilter').addEventListener('change', (e) => {
    typeFilter = e.target.value;
    applyTypeFilter();
  });
  
  document.getElementById('resetFilterBtn').addEventListener('click', () => {
    resetFilter();
  });
  
  document.getElementById('resetViewBtn').addEventListener('click', () => {
    camera.position.set(0, 2, 12);
    controls.target.set(0,0,0);
    controls.update();
    hideConnectionPanel();
    resetFilter();
    document.getElementById('searchInput').value = '';
  });
  
  document.getElementById('clearConnectionsBtn').addEventListener('click', () => {
    hideConnectionPanel();
  });
  
  document.getElementById('closePanelBtn').addEventListener('click', () => {
    hideConnectionPanel();
  });
  
  document.getElementById('learnMore').addEventListener('click', (e) => {
    e.preventDefault();
    alert("To use real data, you need API keys for:\n- NASA FIRMS (wildfires)\n- EIA (power plants)\n- MarineTraffic (ports)\n\nUSGS earthquakes and NOAA hurricanes are public and already integrated.\nVisit the links in the README to sign up.");
  });
  
  document.querySelectorAll('input[name="dataMode"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      if (e.target.checked) switchDataMode(e.target.value);
    });
  });
  
  // Search by name
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const query = e.target.value.trim().toLowerCase();
      if (!query) return;
      const idx = nodeNames.findIndex(name => name.toLowerCase().includes(query));
      if (idx !== -1) {
        const pos = positions[idx];
        camera.position.set(pos.x + 1, pos.y + 1, pos.z + 2);
        controls.target.copy(pos);
        controls.update();
        e.target.value = '';
      } else {
        alert(`No infrastructure found matching "${query}".`);
      }
    }
  });
  
  // Raycaster for clicks
  const raycaster = new THREE.Raycaster();
  function onMouseClick(event) {
    const mouse = new THREE.Vector2();
    mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
    mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(pointsMesh);
    if (intersects.length) {
      const idx = intersects[0].index;
      if (idx !== undefined) {
        if (riskLevel[idx] > RED_THRESHOLD) {
          hideConnectionPanel();
          currentSelectedIdx = idx;
          drawLinesForNode(idx);
          showConnectionPanel(idx);
        } else {
          hideConnectionPanel();
          const msg = `${nodeNames[idx]} has low risk (${riskLevel[idx].toFixed(0)}%). Only red (risk > 70%) triggers cascade.`;
          document.getElementById('status').innerHTML = msg;
          if (tooltipTimer) clearTimeout(tooltipTimer);
          tooltipTimer = setTimeout(() => {
            if (document.getElementById('status').innerHTML === msg)
              document.getElementById('status').innerHTML = `${positions.length} nodes · click red for risk propagation`;
          }, 2000);
        }
      }
    } else {
      hideConnectionPanel();
    }
  }
  window.addEventListener('click', onMouseClick);
  
  // Hover tooltips
  function onMouseMove(event) {
    const mouse = new THREE.Vector2();
    mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
    mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(pointsMesh);
    if (intersects.length) {
      const idx = intersects[0].index;
      if (tooltipTimer) clearTimeout(tooltipTimer);
      document.getElementById('status').innerHTML = `${nodeNames[idx]} | ${nodeTypes[idx]} | Risk: ${riskLevel[idx].toFixed(0)}% | Importance: ${nodeImportance[idx].toFixed(1)}`;
      tooltipTimer = setTimeout(() => {
        document.getElementById('status').innerHTML = `${positions.length} nodes · click red for risk propagation`;
      }, 1500);
    } else {
      if (tooltipTimer) clearTimeout(tooltipTimer);
      document.getElementById('status').innerHTML = `${positions.length} nodes · click red for risk propagation`;
    }
  }
  window.addEventListener('mousemove', onMouseMove);
  
  // Custom cursor
  const cursor = document.getElementById('custom-cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a,button,select,input,.connection-panel').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
  });
  
  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    effectComposer.render();
  }
  animate();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    effectComposer.setSize(window.innerWidth, window.innerHeight);
  });
  
  // Start in real mode
  switchDataMode('real');
</script>
</body>
</html>
