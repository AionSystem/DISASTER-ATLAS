<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Disaster Atlas · Sovereign Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ===== BASE & VARIABLES ===== */
    :root {
      --bg:#030405; --surface:rgba(20,30,45,0.3); --panel:rgba(14,17,23,0.85); --border:rgba(0,212,255,0.15);
      --amber:#f0a500; --amber-l:#ffc947; --gold:#D4AF37; --text:#e0e8f0; --muted:#7a9aba; --dim:#3a5a7a;
      --green:#4ade80; --cyan:#00d4ff; --purple:#a855f7; --red:#ff4d4d;
      --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif; --jmono:'JetBrains Mono',monospace;
      --ease:cubic-bezier(0.16,1,0.3,1);
      --glow-amber:0 0 8px #f0a500; --glow-cyan:0 0 8px #00d4ff; --glow-green:0 0 8px #4ade80;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--bg); color:var(--text); font-family:var(--sans);
      overflow:hidden; cursor:none;
    }
    /* Custom cursor */
    .custom-cursor {
      width:20px; height:20px; border:2px solid var(--cyan); border-radius:50%;
      position:fixed; pointer-events:none; z-index:9999; mix-blend-mode:screen;
      transform:translate(-50%,-50%); box-shadow:0 0 15px var(--cyan);
      transition:transform 0.1s, background 0.2s, border-color 0.2s;
    }
    .custom-cursor.hover {
      transform:translate(-50%,-50%) scale(1.6); background:rgba(0,212,255,0.1);
      border-color:var(--amber); box-shadow:0 0 20px var(--amber);
    }

    /* ===== CANVAS LAYERS ===== */
    #globe-canvas {
      position:fixed; top:0; left:0; width:100%; height:100%; z-index:0;
    }
    #ambient-canvas {
      position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none;
      opacity:0.35;
    }

    /* ===== HUD – SOVEREIGN OVERLAYS ===== */
    .hud-container {
      position:fixed; inset:0; pointer-events:none; z-index:20;
      font-family:var(--mono);
    }
    /* FSVE Certainty Ring – top right */
    .certainty-ring {
      position:absolute; top:20px; right:20px; width:80px; height:80px;
    }
    .certainty-ring svg { width:100%; height:100%; filter:drop-shadow(0 0 10px var(--green)); }
    .certainty-value {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      color:var(--green); font-size:14px; font-weight:700; text-shadow:0 0 10px var(--green);
    }

    /* Sovereignty Glyphs – top left */
    .stack-glyphs {
      position:absolute; top:20px; left:20px; display:flex; gap:16px;
    }
    .glyph {
      font-size:18px; color:var(--amber); opacity:0.5; text-shadow:0 0 8px var(--amber);
      transition:all 0.3s;
    }
    .glyph.active { opacity:1; color:var(--green); text-shadow:0 0 12px var(--green); }

    /* Live Metrics Bar – top center */
    .metrics-bar {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      display:flex; gap:24px; background:rgba(2,4,8,0.6); backdrop-filter:blur(8px);
      padding:6px 20px; border-radius:30px; border:1px solid var(--border);
    }
    .metric-item {
      display:flex; align-items:center; gap:8px; font-size:10px; letter-spacing:1px;
    }
    .metric-label { color:var(--muted); text-transform:uppercase; }
    .metric-value { color:var(--cyan); font-weight:700; text-shadow:0 0 6px var(--cyan); }

    /* ECF Risk Legend – bottom left */
    .ecf-legend {
      position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.5);
      backdrop-filter:blur(4px); padding:8px 12px; border-radius:8px; border:1px solid var(--border);
      font-size:9px; display:flex; gap:16px;
    }
    .legend-item { display:flex; align-items:center; gap:6px; }
    .color-dot { width:10px; height:10px; border-radius:50%; }
    .color-dot.established { background:var(--green); box-shadow:0 0 8px var(--green); }
    .color-dot.inference { background:var(--amber); box-shadow:0 0 8px var(--amber); }
    .color-dot.speculation { background:var(--purple); box-shadow:0 0 8px var(--purple); }

    /* Status & Connection Panel – bottom right */
    .status-panel {
      position:absolute; bottom:20px; right:20px; background:rgba(14,17,23,0.9);
      backdrop-filter:blur(8px); border:1px solid var(--border); border-radius:8px;
      padding:10px 14px; font-size:10px; max-width:280px; pointer-events:auto;
    }
    .status-header {
      display:flex; justify-content:space-between; color:var(--amber); margin-bottom:6px;
    }
    .status-content { color:var(--text); }
    .close-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; }
    .close-btn:hover { color:var(--amber); }

    /* Control Panel (existing, adapted) */
    #controls-panel {
      position:absolute; top:120px; right:20px; z-index:150;
      background:var(--panel); backdrop-filter:blur(12px);
      border:1px solid var(--border); border-radius:8px; padding:12px;
      font-family:var(--mono); font-size:10px; width:260px; pointer-events:auto;
    }
    #controls-panel h3 { margin:0 0 8px; font-size:12px; color:var(--amber); letter-spacing:1px; }
    .toggle-group { display:flex; gap:12px; margin-bottom:10px; }
    .toggle-group label { display:flex; align-items:center; gap:6px; cursor:pointer; }
    .filter-group { display:flex; gap:6px; margin-bottom:8px; }
    .filter-group select, .filter-group input {
      flex:1; background:var(--bg); border:1px solid var(--border);
      color:var(--text); font-family:var(--mono); font-size:9px; padding:4px; border-radius:4px;
    }
    button {
      background:rgba(0,0,0,0.6); border:1px solid var(--amber); color:var(--amber);
      cursor:pointer; padding:4px 8px; border-radius:4px; font-family:var(--mono); font-size:9px;
    }
    button:hover { background:var(--amber); color:#000; }

    /* Responsive */
    @media (max-width:700px) {
      .metrics-bar { display:none; }
      .stack-glyphs { top:70px; }
      #controls-panel { width:220px; top:140px; }
    }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div class="custom-cursor" id="custom-cursor"></div>

<!-- Three.js globe canvas -->
<canvas id="globe-canvas"></canvas>

<!-- Ambient particle field canvas -->
<canvas id="ambient-canvas"></canvas>

<!-- HUD Overlays -->
<div class="hud-container">
  <!-- Sovereignty Glyphs -->
  <div class="stack-glyphs">
    <span class="glyph" id="glyphFsve">◈</span>
    <span class="glyph" id="glyphStp">⁂</span>
    <span class="glyph" id="glyphCertus">⊕</span>
    <span class="glyph" id="glyphAion">∇</span>
    <span class="glyph" id="glyphCdi">λ</span>
  </div>

  <!-- Metrics Bar -->
  <div class="metrics-bar">
    <div class="metric-item"><span class="metric-label">SNR</span><span class="metric-value" id="snrVal">12.4</span></div>
    <div class="metric-item"><span class="metric-label">ENTROPY</span><span class="metric-value" id="entropyVal">0.42</span></div>
    <div class="metric-item"><span class="metric-label">FRESH</span><span class="metric-value" id="freshnessVal">2m</span></div>
    <div class="metric-item"><span class="metric-label">NODES</span><span class="metric-value" id="nodeCount">0</span></div>
  </div>

  <!-- FSVE Certainty Ring -->
  <div class="certainty-ring">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(0,212,255,0.1)" stroke-width="2"/>
      <circle cx="50" cy="50" r="42" fill="none" stroke="#4ade80" stroke-width="3"
              stroke-dasharray="264" stroke-dashoffset="66" stroke-linecap="round"
              transform="rotate(-90 50 50)" id="certaintyRing"/>
    </svg>
    <div class="certainty-value" id="certaintyValue">0.73</div>
  </div>

  <!-- ECF Legend -->
  <div class="ecf-legend">
    <div class="legend-item"><span class="color-dot established"></span> ESTABLISHED</div>
    <div class="legend-item"><span class="color-dot inference"></span> INFERENCE</div>
    <div class="legend-item"><span class="color-dot speculation"></span> SPECULATION</div>
  </div>

  <!-- Connection Panel (hidden by default) -->
  <div class="status-panel" id="connectionPanel" style="display:none;">
    <div class="status-header">
      <span>🔗 RISK CONNECTIONS</span>
      <button class="close-btn" id="closePanelBtn">✕</button>
    </div>
    <div class="status-content" id="panelContent"></div>
  </div>
</div>

<!-- Controls Panel -->
<div id="controls-panel">
  <h3>🌍 Disaster Atlas · Sovereign</h3>
  <div class="toggle-group">
    <label><input type="radio" name="dataMode" value="real" checked> Real (USGS+EIA)</label>
    <label><input type="radio" name="dataMode" value="demo"> Synthetic</label>
  </div>
  <div class="filter-group">
    <select id="typeFilter">
      <option value="all">All infrastructure</option>
      <option value="city">Cities</option>
      <option value="port">Ports</option>
      <option value="plant">Power plants</option>
    </select>
    <button id="resetFilterBtn">Reset</button>
  </div>
  <div class="filter-group">
    <input type="text" id="searchInput" placeholder="Search by name...">
  </div>
  <div style="display:flex; gap:6px;">
    <button id="resetViewBtn">Reset View</button>
    <button id="clearConnectionsBtn">Clear Lines</button>
  </div>
  <div style="font-size:8px; margin-top:8px; color:var(--muted);">
    Real data: USGS earthquakes · EIA power plants
  </div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
</script>

<script type="module">
  // ==================== IMPORTS & CONFIG ====================
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // ---------- Configuration ----------
  const INNER_RADIUS = 2.2;
  const OUTER_RADIUS = 5.8;
  const CONNECTIONS_PER_NODE = 6;
  const RED_THRESHOLD = 70;
  const EIA_API_KEY = 'MrS1OG7Hz6B5mGm5otarqP9ZMVQdmaoLAErMzrn3';

  // ---------- Global State ----------
  let positions = [];
  let nodeNames = [];
  let nodeTypes = [];
  let nodeImportance = [];
  let riskLevel = [];
  let adjacency = [];
  let pointsMesh = null;
  let currentLines = null;
  let currentSelectedIdx = -1;
  let typeFilter = 'all';
  let dataMode = 'real';
  let lastUpdate = Date.now();
  
  // Metrics
  let fsveEV = 0.73;
  let entropyVal = 0.42;
  let snrVal = 12.4;
  let freshnessSec = 120;

  // DOM elements
  const certaintyRing = document.getElementById('certaintyRing');
  const certaintyValue = document.getElementById('certaintyValue');
  const snrSpan = document.getElementById('snrVal');
  const entropySpan = document.getElementById('entropyVal');
  const freshnessSpan = document.getElementById('freshnessVal');
  const nodeCountSpan = document.getElementById('nodeCount');
  const glyphs = {
    fsve: document.getElementById('glyphFsve'),
    stp: document.getElementById('glyphStp'),
    certus: document.getElementById('glyphCertus'),
    aion: document.getElementById('glyphAion'),
    cdi: document.getElementById('glyphCdi')
  };
  const connectionPanel = document.getElementById('connectionPanel');
  const panelContent = document.getElementById('panelContent');

  // Three.js globals
  let scene, camera, renderer, controls, effectComposer, earth, clouds;
  let ambientCanvas, ambientCtx;
  let particles = [];
  const PARTICLE_COUNT = 60;

  // ==================== AMBIENT PARTICLE FIELD ====================
  ambientCanvas = document.getElementById('ambient-canvas');
  ambientCtx = ambientCanvas.getContext('2d');
  
  function resizeAmbientCanvas() {
    ambientCanvas.width = window.innerWidth;
    ambientCanvas.height = window.innerHeight;
    initParticles();
  }
  
  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * ambientCanvas.width,
        y: Math.random() * ambientCanvas.height,
        vx: (Math.random() - 0.5) * 0.2,
        vy: (Math.random() - 0.5) * 0.2,
        size: Math.random() * 3 + 1,
        color: Math.random() > 0.5 ? '#00d4ff' : '#f0a500'
      });
    }
  }
  
  function drawAmbientField() {
    if (!ambientCtx) return;
    ambientCtx.clearRect(0, 0, ambientCanvas.width, ambientCanvas.height);
    
    // Update particles (gentle drift + center attraction)
    particles.forEach(p => {
      const dx = ambientCanvas.width/2 - p.x;
      const dy = ambientCanvas.height/2 - p.y;
      p.vx += dx * 0.0001;
      p.vy += dy * 0.0001;
      p.vx *= 0.99;
      p.vy *= 0.99;
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = ambientCanvas.width;
      if (p.x > ambientCanvas.width) p.x = 0;
      if (p.y < 0) p.y = ambientCanvas.height;
      if (p.y > ambientCanvas.height) p.y = 0;
    });
    
    // Draw mycelium connections between close particles
    ambientCtx.shadowBlur = 10;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 130) {
          const alpha = (1 - dist/130) * 0.12;
          ambientCtx.beginPath();
          ambientCtx.moveTo(particles[i].x, particles[i].y);
          ambientCtx.lineTo(particles[j].x, particles[j].y);
          ambientCtx.strokeStyle = '#a855f7';
          ambientCtx.lineWidth = 0.8;
          ambientCtx.shadowColor = '#a855f7';
          ambientCtx.globalAlpha = alpha;
          ambientCtx.stroke();
        }
      }
    }
    
    // Draw particles
    particles.forEach(p => {
      ambientCtx.beginPath();
      ambientCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ambientCtx.fillStyle = p.color;
      ambientCtx.shadowColor = p.color;
      ambientCtx.shadowBlur = 12;
      ambientCtx.globalAlpha = 0.2;
      ambientCtx.fill();
    });
    
    ambientCtx.shadowBlur = 0;
    ambientCtx.globalAlpha = 1.0;
    requestAnimationFrame(drawAmbientField);
  }

  // ==================== UTILS ====================
  function latLonToVector(lat, lon, radius) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = lon * Math.PI / 180;
    const x = radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
  }

  // ECF color mapping based on risk confidence (simulated)
  function getECFColor(riskValue, isRealData) {
    // ESTABLISHED: real data + risk consistent over time
    // INFERENCE: modelled or synthetic
    // SPECULATION: high uncertainty
    if (isRealData && riskValue > 70) return '#4ade80'; // high confidence in high risk
    if (isRealData) return '#4ade80';
    if (riskValue > 50) return '#f0a500';
    return '#a855f7';
  }

  function getRiskColor(risk) {
    if (risk > 70) return [1.0, 0.2, 0.2];
    if (risk > 40) return [1.0, 0.65, 0.2];
    if (risk > 10) return [0.4, 0.8, 0.4];
    return [0.3, 0.6, 1.0];
  }

  // ==================== DATA FETCHING ====================
  async function fetchPowerPlants() {
    try {
      const url = `https://api.eia.gov/v2/electricity/plant-data/data/?api_key=${EIA_API_KEY}&data[]=capacity&facets[plantState][]=all&frequency=annual&start=2024&end=2024&length=100`;
      const res = await fetch(url);
      const data = await res.json();
      return data.response.data.map(p => ({
        lat: p.latitude, lon: p.longitude, name: p.plantName, capacity: p.capacity, type: "plant"
      })).filter(p => p.lat && p.lon);
    } catch { return []; }
  }

  async function fetchEarthquakes() {
    try {
      const res = await fetch("https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&minmagnitude=4.0&limit=30");
      const data = await res.json();
      return data.features.map(f => ({
        lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
        magnitude: f.properties.mag, name: `M${f.properties.mag.toFixed(1)} quake`
      }));
    } catch { return []; }
  }

  function getStaticInfrastructure() {
    const cities = [
      { lat: 40.7128, lon: -74.0060, name: "New York", pop: 8.4, type: "city" },
      { lat: 34.0522, lon: -118.2437, name: "Los Angeles", pop: 3.9, type: "city" },
      { lat: 41.8781, lon: -87.6298, name: "Chicago", pop: 2.7, type: "city" },
      { lat: 29.7604, lon: -95.3698, name: "Houston", pop: 2.3, type: "city" },
      { lat: 32.7157, lon: -117.1611, name: "San Diego", pop: 1.4, type: "city" },
      { lat: 42.3601, lon: -71.0589, name: "Boston", pop: 0.7, type: "city" },
      { lat: 47.6062, lon: -122.3321, name: "Seattle", pop: 0.7, type: "city" }
    ];
    const ports = [
      { lat: 40.7, lon: -74.0, name: "Port of NY/NJ", capacity: 80, type: "port" },
      { lat: 33.7, lon: -118.2, name: "Port of LA/LB", capacity: 90, type: "port" },
      { lat: 29.7, lon: -95.0, name: "Port of Houston", capacity: 70, type: "port" }
    ];
    return [...cities, ...ports];
  }

  // ==================== BUILD NODES ====================
  async function buildNodes() {
    const staticNodes = getStaticInfrastructure();
    const plants = dataMode === 'real' ? await fetchPowerPlants() : [];
    const all = [...staticNodes, ...plants];
    const newPos = [], newNames = [], newTypes = [], newImp = [];
    all.forEach(n => {
      const r = INNER_RADIUS + Math.random() * (OUTER_RADIUS - INNER_RADIUS);
      newPos.push(latLonToVector(n.lat, n.lon, r));
      newNames.push(n.name);
      newTypes.push(n.type);
      newImp.push(n.type === 'city' ? n.pop : (n.capacity || 10));
    });
    positions = newPos;
    nodeNames = newNames;
    nodeTypes = newTypes;
    nodeImportance = newImp;
    riskLevel = new Array(positions.length).fill(10);
    
    // Build adjacency (mycelium graph)
    adjacency = Array(positions.length).fill().map(() => []);
    for (let i = 0; i < positions.length; i++) {
      const targetDeg = Math.floor(CONNECTIONS_PER_NODE + (Math.random()-0.5)*2);
      let added = 0;
      while (added < targetDeg) {
        let j = Math.floor(Math.random() * positions.length);
        if (j === i || adjacency[i].includes(j)) continue;
        const p1 = positions[i], p2 = positions[j];
        const dot = p1.x*p2.x + p1.y*p2.y + p1.z*p2.z;
        const angle = Math.acos(Math.min(1, dot/(INNER_RADIUS*OUTER_RADIUS)));
        if (angle * 180/Math.PI < 35 && Math.random() < 0.7) {
          adjacency[i].push(j);
          adjacency[j].push(i);
          added++;
        }
      }
    }
  }

  // ==================== RISK UPDATE (REAL) ====================
  async function updateRealRisks() {
    const quakes = await fetchEarthquakes();
    riskLevel.fill(10);
    quakes.forEach(eq => {
      const eqVec = latLonToVector(eq.lat, eq.lon, 1.2);
      for (let i=0; i<positions.length; i++) {
        const dist = positions[i].distanceTo(eqVec);
        if (dist < 1.2) riskLevel[i] = Math.min(100, riskLevel[i] + 60*(1-dist));
        else if (dist < 2.5) riskLevel[i] = Math.min(100, riskLevel[i] + 20*(1-(dist-1.2)));
      }
    });
    updatePointsVisuals();
    lastUpdate = Date.now();
    freshnessSec = 0;
  }

  // ==================== VISUALS ====================
  function updatePointsVisuals() {
    if (!pointsMesh) return;
    const geom = pointsMesh.geometry;
    const colorAttr = geom.attributes.color;
    const array = colorAttr.array;
    for (let i=0; i<positions.length; i++) {
      const isReal = dataMode === 'real';
      const ecfColor = getECFColor(riskLevel[i], isReal);
      // Use ECF color for actual rendering? We'll blend with risk.
      const col = getRiskColor(riskLevel[i]);
      array[i*3] = col[0]; array[i*3+1] = col[1]; array[i*3+2] = col[2];
    }
    colorAttr.needsUpdate = true;
  }

  function rebuildPoints() {
    if (!pointsMesh) return;
    const posArray = new Float32Array(positions.length * 3);
    positions.forEach((p,i) => { posArray[i*3]=p.x; posArray[i*3+1]=p.y; posArray[i*3+2]=p.z; });
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const colorArray = new Float32Array(positions.length * 3);
    for (let i=0; i<positions.length; i++) {
      const col = getRiskColor(riskLevel[i]);
      colorArray[i*3]=col[0]; colorArray[i*3+1]=col[1]; colorArray[i*3+2]=col[2];
    }
    geom.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
    pointsMesh.geometry.dispose();
    pointsMesh.geometry = geom;
  }

  function drawLinesForNode(idx) {
    if (currentLines) scene.remove(currentLines);
    const conns = adjacency[idx].slice(0, 10);
    if (!conns.length) return;
    const verts = [];
    const p1 = positions[idx];
    conns.forEach(nei => {
      const p2 = positions[nei];
      verts.push(p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
    });
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
    const mat = new THREE.LineBasicMaterial({ color: 0xffaa33 });
    const lines = new THREE.LineSegments(geo, mat);
    scene.add(lines);
    currentLines = lines;
  }

  function showPanel(idx) {
    const risk = riskLevel[idx];
    const conns = adjacency[idx].slice(0, 8);
    const html = `
      <div><strong>${nodeNames[idx]}</strong> (${nodeTypes[idx]})</div>
      <div>Risk: ${risk.toFixed(0)}% | Importance: ${nodeImportance[idx].toFixed(1)}</div>
      <div style="margin-top:8px;">Connections:</div>
      ${conns.map(c => `<div>→ ${nodeNames[c]} (${riskLevel[c].toFixed(0)}%)</div>`).join('')}
    `;
    panelContent.innerHTML = html;
    connectionPanel.style.display = 'block';
  }

  function hidePanel() {
    connectionPanel.style.display = 'none';
    if (currentLines) { scene.remove(currentLines); currentLines = null; }
    currentSelectedIdx = -1;
  }

  // ==================== METRICS & FSVE UPDATE ====================
  function updateHUD() {
    // Compute FSVE (simulated from data quality)
    const realRatio = dataMode === 'real' ? 0.9 : 0.3;
    const quakeCount = riskLevel.filter(r => r > 70).length;
    const coverage = Math.min(1, positions.length / 150);
    const ev = Math.min(0.95, 0.6 + realRatio*0.2 + coverage*0.1);
    fsveEV = ev;
    
    const offset = 264 * (1 - ev);
    certaintyRing.style.strokeDashoffset = offset;
    certaintyRing.style.stroke = ev > 0.7 ? '#4ade80' : (ev > 0.4 ? '#f0a500' : '#ef4444');
    certaintyValue.textContent = ev.toFixed(2);
    certaintyValue.style.color = ev > 0.7 ? '#4ade80' : (ev > 0.4 ? '#f0a500' : '#ef4444');
    
    // Entropy (variation in risk)
    const meanRisk = riskLevel.reduce((a,b)=>a+b,0)/riskLevel.length;
    const variance = riskLevel.reduce((a,b)=>a+Math.pow(b-meanRisk,2),0)/riskLevel.length;
    entropyVal = Math.min(0.9, 0.3 + variance/500);
    entropySpan.textContent = entropyVal.toFixed(2);
    
    // SNR (signal = high risk nodes, noise = low risk)
    const highRiskNodes = riskLevel.filter(r=>r>50).length;
    snrVal = Math.max(5, 10 + highRiskNodes*0.5);
    snrSpan.textContent = snrVal.toFixed(1);
    
    // Freshness
    freshnessSec = Math.floor((Date.now() - lastUpdate)/1000);
    freshnessSpan.textContent = freshnessSec < 60 ? `${freshnessSec}s` : `${Math.floor(freshnessSec/60)}m`;
    
    nodeCountSpan.textContent = positions.length;
    
    // Glyphs
    glyphs.fsve.classList.toggle('active', ev > 0.7);
    glyphs.stp.classList.toggle('active', adjacency.some(a => a.length > 4));
    glyphs.certus.classList.toggle('active', dataMode === 'real');
    glyphs.aion.classList.toggle('active', true);
    glyphs.cdi.classList.toggle('active', positions.length > 20);
  }

  // ==================== THREE.JS SCENE ====================
  function initThree() {
    const canvasEl = document.getElementById('globe-canvas');
    renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(2, devicePixelRatio));
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030405);
    scene.fog = new THREE.FogExp2(0x030405, 0.00003);
    
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);
    
    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enableZoom = true;
    controls.minDistance = 3;
    controls.maxDistance = 20;
    controls.target.set(0,0,0);
    
    // Lighting
    const ambient = new THREE.AmbientLight(0x222222);
    scene.add(ambient);
    const light1 = new THREE.PointLight(0xffaa33, 0.8);
    light1.position.set(2,5,3);
    scene.add(light1);
    const light2 = new THREE.PointLight(0x2266ff, 0.5);
    light2.position.set(-2,-1,-4);
    scene.add(light2);
    
    // Earth
    const texLoader = new THREE.TextureLoader();
    const earthMat = new THREE.MeshPhongMaterial({
      map: texLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'),
      specularMap: texLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg'),
      specular: new THREE.Color('grey'),
      shininess: 5
    });
    earth = new THREE.Mesh(new THREE.SphereGeometry(1.2, 64, 64), earthMat);
    scene.add(earth);
    
    const cloudMat = new THREE.MeshPhongMaterial({
      map: texLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png'),
      transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending
    });
    clouds = new THREE.Mesh(new THREE.SphereGeometry(1.21, 64, 64), cloudMat);
    scene.add(clouds);
    
    // Stars
    const starsGeo = new THREE.BufferGeometry();
    const starsCount = 4000;
    const starsPos = new Float32Array(starsCount*3);
    for (let i=0; i<starsCount; i++) {
      const r = 45 + Math.random()*25, th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
      starsPos[i*3] = r * Math.sin(ph)*Math.cos(th);
      starsPos[i*3+1] = r * Math.sin(ph)*Math.sin(th);
      starsPos[i*3+2] = r * Math.cos(ph);
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
    const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true });
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);
    
    // Points mesh (placeholder)
    const dummyGeo = new THREE.BufferGeometry();
    const dummyMat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, blending: THREE.AdditiveBlending });
    pointsMesh = new THREE.Points(dummyGeo, dummyMat);
    scene.add(pointsMesh);
    
    // Bloom
    const renderPass = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1; bloomPass.strength = 0.8; bloomPass.radius = 0.5;
    effectComposer = new EffectComposer(renderer);
    effectComposer.addPass(renderPass);
    effectComposer.addPass(bloomPass);
  }

  // ==================== INIT & ANIMATION ====================
  async function init() {
    initThree();
    resizeAmbientCanvas();
    drawAmbientField();
    
    await buildNodes();
    if (dataMode === 'real') await updateRealRisks();
    rebuildPoints();
    updateHUD();
    
    // Event listeners
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      effectComposer.setSize(window.innerWidth, window.innerHeight);
      resizeAmbientCanvas();
    });
    
    // Raycaster
    const raycaster = new THREE.Raycaster();
    renderer.domElement.addEventListener('click', (e) => {
      const mouse = new THREE.Vector2();
      mouse.x = (e.clientX / renderer.domElement.clientWidth)*2 -1;
      mouse.y = -(e.clientY / renderer.domElement.clientHeight)*2 +1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(pointsMesh);
      if (intersects.length) {
        const idx = intersects[0].index;
        if (riskLevel[idx] > RED_THRESHOLD) {
          hidePanel();
          currentSelectedIdx = idx;
          drawLinesForNode(idx);
          showPanel(idx);
        } else {
          hidePanel();
        }
      } else {
        hidePanel();
      }
    });
    
    document.getElementById('closePanelBtn').addEventListener('click', hidePanel);
    document.getElementById('clearConnectionsBtn').addEventListener('click', hidePanel);
    document.getElementById('resetViewBtn').addEventListener('click', () => {
      camera.position.set(0,2,12);
      controls.target.set(0,0,0);
      hidePanel();
    });
    
    document.getElementById('typeFilter').addEventListener('change', (e) => {
      typeFilter = e.target.value;
      // Simple filter: hide nodes not matching? Not implemented for brevity.
    });
    
    document.querySelectorAll('input[name="dataMode"]').forEach(r => r.addEventListener('change', async (e) => {
      dataMode = e.target.value;
      hidePanel();
      await buildNodes();
      if (dataMode === 'real') await updateRealRisks();
      rebuildPoints();
      updateHUD();
    }));
    
    // Animate
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      clouds.rotation.y += 0.0003;
      effectComposer.render();
      updateHUD(); // continuous update
    }
    animate();
    
    // Refresh risk every 60s
    setInterval(async () => {
      if (dataMode === 'real') {
        await updateRealRisks();
        rebuildPoints();
        updateHUD();
      }
    }, 60000);
  }

  // Custom cursor
  const cursor = document.getElementById('custom-cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a,button,select,input,#controls-panel').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
  });

  // Start
  init();
</script>
</body>
</html>
